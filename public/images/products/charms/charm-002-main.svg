<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FAF7F4"/>
      <stop offset="100%" stop-color="#F0EBE3"/>
    </radialGradient>
    <radialGradient id="gold2" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#F5D78E"/>
      <stop offset="40%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    <radialGradient id="dia2" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#E0F0FF"/>
      <stop offset="100%" stop-color="#7799BB"/>
    </radialGradient>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#00000025"/>
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg2)"/>
  <g filter="url(#sh2)">
    <ellipse cx="300" cy="128" rx="11" ry="18" fill="none" stroke="url(#gold2)" stroke-width="5"/>
    <!-- 5-pointed star -->
    <polygon points="300,175 322,250 400,250 338,295 360,370 300,325 240,370 262,295 200,250 278,250" fill="url(#gold2)"/>
    <!-- Diamond at center -->
    <circle cx="300" cy="290" r="14" fill="url(#dia2)"/>
    <!-- Small diamonds on points -->
    <circle cx="300" cy="188" r="6" fill="url(#dia2)" opacity="0.9"/>
    <circle cx="392" cy="256" r="5" fill="url(#dia2)" opacity="0.85"/>
    <circle cx="355" cy="362" r="5" fill="url(#dia2)" opacity="0.85"/>
    <circle cx="245" cy="362" r="5" fill="url(#dia2)" opacity="0.85"/>
    <circle cx="208" cy="256" r="5" fill="url(#dia2)" opacity="0.85"/>
    <!-- Highlight -->
    <path d="M278 215 C278 205 286 198 296 198" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="300" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#9E8A6E" letter-spacing="3">CELESTIAL STAR</text>
</svg>