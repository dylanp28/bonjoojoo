<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FAF7F4"/>
      <stop offset="100%" stop-color="#F0EBE3"/>
    </radialGradient>
    <radialGradient id="gold3" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#F5D78E"/>
      <stop offset="40%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    <radialGradient id="wing3" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#FFE8F0"/>
      <stop offset="50%" stop-color="#FFAEC9"/>
      <stop offset="100%" stop-color="#D4688A"/>
    </radialGradient>
    <radialGradient id="dia3" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#E8F0FF"/>
      <stop offset="100%" stop-color="#8899CC"/>
    </radialGradient>
    <filter id="sh3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#00000025"/>
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg3)"/>
  <g filter="url(#sh3)">
    <ellipse cx="300" cy="128" rx="11" ry="18" fill="none" stroke="url(#gold3)" stroke-width="5"/>
    <!-- Upper wings -->
    <path d="M300 295 C280 270 190 220 185 260 C180 295 240 305 300 295Z" fill="url(#wing3)" opacity="0.9"/>
    <path d="M300 295 C320 270 410 220 415 260 C420 295 360 305 300 295Z" fill="url(#wing3)" opacity="0.9"/>
    <!-- Lower wings -->
    <path d="M300 310 C275 325 195 355 200 395 C205 420 260 400 300 370 Z" fill="url(#wing3)" opacity="0.75"/>
    <path d="M300 310 C325 325 405 355 400 395 C395 420 340 400 300 370 Z" fill="url(#wing3)" opacity="0.75"/>
    <!-- Wing veins -->
    <path d="M300 295 C270 272 210 238 195 262" fill="none" stroke="url(#gold3)" stroke-width="1.5" opacity="0.6"/>
    <path d="M300 295 C330 272 390 238 405 262" fill="none" stroke="url(#gold3)" stroke-width="1.5" opacity="0.6"/>
    <!-- Body -->
    <ellipse cx="300" cy="305" rx="8" ry="40" fill="url(#gold3)"/>
    <!-- Diamond accents on wings -->
    <circle cx="245" cy="268" r="5" fill="url(#dia3)" opacity="0.9"/>
    <circle cx="355" cy="268" r="5" fill="url(#dia3)" opacity="0.9"/>
    <circle cx="225" cy="285" r="4" fill="url(#dia3)" opacity="0.8"/>
    <circle cx="375" cy="285" r="4" fill="url(#dia3)" opacity="0.8"/>
    <circle cx="232" cy="355" r="4" fill="url(#dia3)" opacity="0.75"/>
    <circle cx="368" cy="355" r="4" fill="url(#dia3)" opacity="0.75"/>
    <!-- Head -->
    <circle cx="300" cy="258" r="8" fill="url(#gold3)"/>
    <circle cx="295" cy="255" r="3" fill="url(#dia3)"/>
    <circle cx="305" cy="255" r="3" fill="url(#dia3)"/>
  </g>
  <text x="300" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#9E8A6E" letter-spacing="3">GARDEN BUTTERFLY</text>
</svg>