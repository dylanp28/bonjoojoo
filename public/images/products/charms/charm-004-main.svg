<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FAF7F4"/>
      <stop offset="100%" stop-color="#F0EBE3"/>
    </radialGradient>
    <radialGradient id="gold4" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#F5D78E"/>
      <stop offset="40%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    <filter id="sh4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#00000030"/>
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg4)"/>
  <g filter="url(#sh4)">
    <ellipse cx="300" cy="128" rx="11" ry="18" fill="none" stroke="url(#gold4)" stroke-width="5"/>
    <!-- Lock body -->
    <rect x="238" y="295" width="124" height="110" rx="12" fill="url(#gold4)"/>
    <!-- Lock shackle -->
    <path d="M262 295 L262 258 C262 228 338 228 338 258 L338 295" fill="none" stroke="url(#gold4)" stroke-width="22" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="300" cy="342" r="16" fill="#B8860B" opacity="0.6"/>
    <rect x="294" y="352" width="12" height="22" rx="4" fill="#B8860B" opacity="0.6"/>
    <!-- Engraving lines -->
    <line x1="252" y1="318" x2="348" y2="318" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="252" y1="330" x2="348" y2="330" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="252" y1="342" x2="280" y2="342" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="320" y1="342" x2="348" y2="342" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <!-- Highlight -->
    <path d="M248 305 C248 298 255 295 263 296" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
    <path d="M268 240 C268 232 276 227 286 227" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="300" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#9E8A6E" letter-spacing="3">VINTAGE LOCK</text>
</svg>