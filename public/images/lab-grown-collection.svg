<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#f5f5f4"/>
  <rect x="20" y="20" width="360" height="260" rx="8" fill="white" stroke="#d6d3d1" stroke-width="2"/>
  
  <!-- Ring -->
  <circle cx="150" cy="120" r="30" fill="none" stroke="#0c0a09" stroke-width="3" opacity="0.7"/>
  <circle cx="150" cy="90" r="8" fill="#0c0a09" opacity="0.7"/>
  
  <!-- Necklace -->
  <path d="M220 90 Q250 100 280 90" fill="none" stroke="#0c0a09" stroke-width="3" opacity="0.7"/>
  <circle cx="250" cy="110" r="6" fill="#0c0a09" opacity="0.7"/>
  
  <!-- Earrings -->
  <circle cx="120" cy="180" r="15" fill="none" stroke="#0c0a09" stroke-width="2" opacity="0.7"/>
  <circle cx="120" cy="190" r="4" fill="#0c0a09" opacity="0.7"/>
  
  <circle cx="160" cy="180" r="15" fill="none" stroke="#0c0a09" stroke-width="2" opacity="0.7"/>
  <circle cx="160" cy="190" r="4" fill="#0c0a09" opacity="0.7"/>
  
  <!-- Bracelet -->
  <path d="M220 170 Q240 160 260 170 Q280 180 280 200 Q260 210 240 200 Q220 190 220 170" 
        fill="none" stroke="#0c0a09" stroke-width="3" opacity="0.7"/>
  <circle cx="240" cy="185" r="4" fill="#0c0a09" opacity="0.7"/>
  <circle cx="260" cy="185" r="4" fill="#0c0a09" opacity="0.7"/>
  
  <!-- Collection Label -->
  <text x="200" y="260" text-anchor="middle" font-family="serif" font-size="14" fill="#0c0a09" opacity="0.6">
    Lab-Grown Collection
  </text>
</svg>