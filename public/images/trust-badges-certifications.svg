<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F6F0"/>
      <stop offset="100%" style="stop-color:#E8F4F8"/>
    </linearGradient>
    <linearGradient id="certGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8941F"/>
    </linearGradient>
    <filter id="badgeShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="#ffffff"/>
  
  <!-- GIA Certification Badge -->
  <g transform="translate(100, 150)">
    <circle cx="0" cy="0" r="60" fill="url(#badgeGrad)" stroke="#87A96B" stroke-width="2" filter="url(#badgeShadow)"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#D4AF37" stroke-width="1"/>
    
    <!-- GIA Logo representation -->
    <text x="0" y="-10" font-family="'Montserrat', sans-serif" font-size="16" fill="#2C2C2C" font-weight="700" text-anchor="middle">
      GIA
    </text>
    <text x="0" y="8" font-family="'Montserrat', sans-serif" font-size="8" fill="#2C2C2C" font-weight="400" text-anchor="middle">
      CERTIFIED
    </text>
    <text x="0" y="20" font-family="'Montserrat', sans-serif" font-size="6" fill="#87A96B" font-weight="400" text-anchor="middle">
      LAB-GROWN
    </text>
    
    <!-- Decorative elements -->
    <circle cx="-25" cy="-25" r="2" fill="#D4AF37"/>
    <circle cx="25" cy="-25" r="2" fill="#D4AF37"/>
    <circle cx="-25" cy="25" r="2" fill="#D4AF37"/>
    <circle cx="25" cy="25" r="2" fill="#D4AF37"/>
  </g>
  
  <!-- IGI Certification Badge -->
  <g transform="translate(300, 150)">
    <circle cx="0" cy="0" r="60" fill="url(#badgeGrad)" stroke="#87A96B" stroke-width="2" filter="url(#badgeShadow)"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#D4AF37" stroke-width="1"/>
    
    <text x="0" y="-10" font-family="'Montserrat', sans-serif" font-size="16" fill="#2C2C2C" font-weight="700" text-anchor="middle">
      IGI
    </text>
    <text x="0" y="8" font-family="'Montserrat', sans-serif" font-size="8" fill="#2C2C2C" font-weight="400" text-anchor="middle">
      CERTIFIED
    </text>
    <text x="0" y="20" font-family="'Montserrat', sans-serif" font-size="6" fill="#87A96B" font-weight="400" text-anchor="middle">
      LAB-GROWN
    </text>
    
    <!-- Decorative elements -->
    <path d="M-20,-20 L-15,-25 L-20,-30 L-25,-25 Z" fill="#D4AF37"/>
    <path d="M20,-20 L25,-15 L20,-10 L15,-15 Z" fill="#D4AF37"/>
    <path d="M-20,20 L-15,25 L-20,30 L-25,25 Z" fill="#D4AF37"/>
    <path d="M20,20 L25,25 L20,30 L15,25 Z" fill="#D4AF37"/>
  </g>
  
  <!-- Ethical Sourcing Badge -->
  <g transform="translate(500, 150)">
    <circle cx="0" cy="0" r="60" fill="url(#badgeGrad)" stroke="#87A96B" stroke-width="2" filter="url(#badgeShadow)"/>
    
    <!-- Ethical heart icon -->
    <path d="M0,10 C-15,-5 -25,-5 -15,10 C0,20 0,20 0,20 C0,20 0,20 15,10 C25,-5 15,-5 0,10" fill="#E8B4B8"/>
    
    <text x="0" y="35" font-family="'Montserrat', sans-serif" font-size="8" fill="#2C2C2C" font-weight="600" text-anchor="middle">
      ETHICAL
    </text>
    <text x="0" y="47" font-family="'Montserrat', sans-serif" font-size="8" fill="#2C2C2C" font-weight="600" text-anchor="middle">
      SOURCING
    </text>
  </g>
  
  <!-- Environmental Badge -->
  <g transform="translate(700, 150)">
    <circle cx="0" cy="0" r="60" fill="url(#badgeGrad)" stroke="#87A96B" stroke-width="2" filter="url(#badgeShadow)"/>
    
    <!-- Leaf icon -->
    <path d="M0,-30 Q-20,-20 -15,0 Q0,15 15,0 Q20,-20 0,-30" fill="#87A96B"/>
    <path d="M0,-25 Q-10,-20 -8,-5 Q0,8 8,-5 Q10,-20 0,-25" fill="#A4C3A7"/>
    <line x1="0" y1="-10" x2="0" y2="5" stroke="#87A96B" stroke-width="2"/>
    
    <text x="0" y="35" font-family="'Montserrat', sans-serif" font-size="8" fill="#2C2C2C" font-weight="600" text-anchor="middle">
      ECO
    </text>
    <text x="0" y="47" font-family="'Montserrat', sans-serif" font-size="8" fill="#2C2C2C" font-weight="600" text-anchor="middle">
      RESPONSIBLE
    </text>
  </g>
  
  <!-- Lifetime Warranty Badge -->
  <g transform="translate(900, 150)">
    <circle cx="0" cy="0" r="60" fill="url(#badgeGrad)" stroke="#87A96B" stroke-width="2" filter="url(#badgeShadow)"/>
    
    <!-- Shield icon -->
    <path d="M0,-30 Q-25,-25 -25,0 Q-25,20 0,35 Q25,20 25,0 Q25,-25 0,-30" fill="url(#certGold)"/>
    <path d="M0,-25 Q-20,-20 -20,0 Q-20,15 0,25 Q20,15 20,0 Q20,-20 0,-25" fill="#F8F6F0"/>
    
    <!-- Check mark -->
    <path d="M-8,0 L-2,8 L10,-8" stroke="#87A96B" stroke-width="3" fill="none"/>
    
    <text x="0" y="47" font-family="'Montserrat', sans-serif" font-size="8" fill="#2C2C2C" font-weight="600" text-anchor="middle">
      LIFETIME WARRANTY
    </text>
  </g>
  
  <!-- Quality Guarantee Badge -->
  <g transform="translate(1100, 150)">
    <circle cx="0" cy="0" r="60" fill="url(#badgeGrad)" stroke="#87A96B" stroke-width="2" filter="url(#badgeShadow)"/>
    
    <!-- Star icon -->
    <path d="M0,-25 L-7,-8 L-25,-8 L-12,3 L-18,20 L0,10 L18,20 L12,3 L25,-8 L7,-8 Z" fill="url(#certGold)"/>
    <path d="M0,-20 L-5,-6 L-18,-6 L-8,2 L-12,15 L0,7 L12,15 L8,2 L18,-6 L5,-6 Z" fill="#F8F6F0"/>
    
    <text x="0" y="40" font-family="'Montserrat', sans-serif" font-size="8" fill="#2C2C2C" font-weight="600" text-anchor="middle">
      QUALITY
    </text>
    <text x="0" y="52" font-family="'Montserrat', sans-serif" font-size="8" fill="#2C2C2C" font-weight="600" text-anchor="middle">
      GUARANTEE
    </text>
  </g>
  
  <!-- Trust message -->
  <g transform="translate(600, 50)">
    <text x="0" y="0" font-family="'Montserrat', sans-serif" font-size="14" fill="#2C2C2C" font-weight="400" text-anchor="middle">
      Trusted by thousands of couples worldwide
    </text>
  </g>
  
  <!-- Bottom trust message -->
  <g transform="translate(600, 270)">
    <text x="0" y="0" font-family="'Montserrat', sans-serif" font-size="12" fill="#87A96B" font-weight="400" text-anchor="middle">
      All bonjoojoo diamonds come with internationally recognized certifications
    </text>
  </g>
</svg>