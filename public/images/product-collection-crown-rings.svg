<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="crownGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F6F0"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8941F"/>
    </linearGradient>
    <radialGradient id="royalDiamond" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#E8F4F8;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0.4"/>
    </radialGradient>
    <filter id="royalGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="collectionShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <!-- Elegant background -->
  <rect width="1200" height="800" fill="#ffffff"/>
  
  <!-- Collection title -->
  <g transform="translate(600, 80)">
    <text x="0" y="0" font-family="'Playfair Display', serif" font-size="36" fill="#2C2C2C" font-weight="600" text-anchor="middle">
      Crown Collection
    </text>
    <text x="0" y="30" font-family="'Montserrat', sans-serif" font-size="16" fill="#87A96B" text-anchor="middle">
      Regal elegance for the modern queen
    </text>
  </g>
  
  <!-- Ring 1: Tiara Crown Ring -->
  <g transform="translate(300, 250)">
    <ellipse cx="0" cy="80" rx="120" ry="30" fill="#000000" opacity="0.03"/>
    
    <!-- Ring band -->
    <ellipse cx="0" cy="40" rx="80" ry="12" fill="url(#crownGold)" filter="url(#collectionShadow)"/>
    <ellipse cx="0" cy="38" rx="75" ry="10" fill="#F8F6F0"/>
    
    <!-- Tiara crown design -->
    <g transform="translate(0, 0)">
      <!-- Crown base -->
      <rect x="-40" y="-10" width="80" height="20" rx="3" fill="url(#crownGold)"/>
      
      <!-- Crown peaks -->
      <polygon points="-30,-10 -25,-35 -20,-10" fill="url(#crownGold)"/>
      <polygon points="-10,-10 -5,-45 0,-10" fill="url(#crownGold)"/>
      <polygon points="10,-10 15,-45 20,-10" fill="url(#crownGold)"/>
      <polygon points="30,-10 35,-35 40,-10" fill="url(#crownGold)"/>
      
      <!-- Center crown piece -->
      <polygon points="-5,-10 0,-55 5,-10" fill="url(#crownGold)"/>
      
      <!-- Crown diamonds -->
      <circle cx="0" cy="-45" r="8" fill="url(#royalDiamond)" filter="url(#royalGlow)"/>
      <circle cx="0" cy="-45" r="5" fill="#ffffff" opacity="0.9"/>
      
      <circle cx="-25" cy="-25" r="5" fill="url(#royalDiamond)" filter="url(#royalGlow)"/>
      <circle cx="25" cy="-25" r="5" fill="url(#royalDiamond)" filter="url(#royalGlow)"/>
      <circle cx="-5" cy="-35" r="4" fill="url(#royalDiamond)" filter="url(#royalGlow)"/>
      <circle cx="5" cy="-35" r="4" fill="url(#royalDiamond)" filter="url(#royalGlow)"/>
      
      <!-- Small accent diamonds -->
      <circle cx="-15" cy="-15" r="2.5" fill="#E8F4F8"/>
      <circle cx="15" cy="-15" r="2.5" fill="#E8F4F8"/>
      <circle cx="-35" cy="-20" r="3" fill="#E8F4F8"/>
      <circle cx="35" cy="-20" r="3" fill="#E8F4F8"/>
    </g>
    
    <!-- Product info -->
    <text x="0" y="120" font-family="'Playfair Display', serif" font-size="18" fill="#2C2C2C" text-anchor="middle" font-weight="500">
      Royal Tiara Ring
    </text>
    <text x="0" y="140" font-family="'Montserrat', sans-serif" font-size="12" fill="#87A96B" text-anchor="middle">
      0.75 carat lab-grown diamonds
    </text>
    <text x="0" y="160" font-family="'Montserrat', sans-serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="600">
      $2,450
    </text>
  </g>
  
  <!-- Ring 2: Empress Crown Ring -->
  <g transform="translate(600, 320)">
    <ellipse cx="0" cy="80" rx="120" ry="30" fill="#000000" opacity="0.03"/>
    
    <!-- Ring band -->
    <ellipse cx="0" cy="40" rx="85" ry="12" fill="url(#crownGold)" filter="url(#collectionShadow)"/>
    <ellipse cx="0" cy="38" rx="80" ry="10" fill="#F8F6F0"/>
    
    <!-- Empress crown design -->
    <g transform="translate(0, -5)">
      <!-- Crown base with curves -->
      <path d="M-45,5 Q-40,-10 -30,-5 Q-20,-15 -10,-5 Q0,-20 10,-5 Q20,-15 30,-5 Q40,-10 45,5 L35,15 L-35,15 Z" fill="url(#crownGold)"/>
      
      <!-- Center peak -->
      <polygon points="-8,-5 0,-35 8,-5" fill="url(#crownGold)"/>
      
      <!-- Side peaks -->
      <polygon points="-35,-5 -25,-25 -15,-5" fill="url(#crownGold)"/>
      <polygon points="15,-5 25,-25 35,-5" fill="url(#crownGold)"/>
      
      <!-- Center diamond -->
      <circle cx="0" cy="-25" r="7" fill="url(#royalDiamond)" filter="url(#royalGlow)"/>
      <circle cx="0" cy="-25" r="4.5" fill="#ffffff" opacity="0.9"/>
      
      <!-- Side diamonds -->
      <circle cx="-25" cy="-15" r="5" fill="url(#royalDiamond)" filter="url(#royalGlow)"/>
      <circle cx="25" cy="-15" r="5" fill="url(#royalDiamond)" filter="url(#royalGlow)"/>
      
      <!-- Accent diamonds along crown -->
      <circle cx="-35" cy="0" r="3" fill="#E8F4F8"/>
      <circle cx="-10" cy="-8" r="3" fill="#E8F4F8"/>
      <circle cx="10" cy="-8" r="3" fill="#E8F4F8"/>
      <circle cx="35" cy="0" r="3" fill="#E8F4F8"/>
      
      <!-- Decorative flourishes -->
      <circle cx="-40" cy="-5" r="1.5" fill="#D4AF37"/>
      <circle cx="40" cy="-5" r="1.5" fill="#D4AF37"/>
    </g>
    
    <!-- Product info -->
    <text x="0" y="120" font-family="'Playfair Display', serif" font-size="18" fill="#2C2C2C" text-anchor="middle" font-weight="500">
      Empress Crown Ring
    </text>
    <text x="0" y="140" font-family="'Montserrat', sans-serif" font-size="12" fill="#87A96B" text-anchor="middle">
      0.65 carat lab-grown diamonds
    </text>
    <text x="0" y="160" font-family="'Montserrat', sans-serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="600">
      $2,850
    </text>
  </g>
  
  <!-- Ring 3: Princess Crown Ring -->
  <g transform="translate(900, 250)">
    <ellipse cx="0" cy="80" rx="120" ry="30" fill="#000000" opacity="0.03"/>
    
    <!-- Ring band -->
    <ellipse cx="0" cy="40" rx="75" ry="12" fill="url(#crownGold)" filter="url(#collectionShadow)"/>
    <ellipse cx="0" cy="38" rx="70" ry="10" fill="#F8F6F0"/>
    
    <!-- Princess crown design -->
    <g transform="translate(0, 0)">
      <!-- Crown base -->
      <rect x="-35" y="-8" width="70" height="18" rx="2" fill="url(#crownGold)"/>
      
      <!-- Delicate crown points -->
      <polygon points="-25,-8 -20,-30 -15,-8" fill="url(#crownGold)"/>
      <polygon points="-8,-8 -3,-35 2,-8" fill="url(#crownGold)"/>
      <polygon points="8,-8 13,-35 18,-8" fill="url(#crownGold)"/>
      <polygon points="25,-8 30,-30 35,-8" fill="url(#crownGold)"/>
      
      <!-- Center pinnacle -->
      <polygon points="-3,-8 0,-40 3,-8" fill="url(#crownGold)"/>
      
      <!-- Princess diamonds -->
      <circle cx="0" cy="-30" r="6" fill="url(#royalDiamond)" filter="url(#royalGlow)"/>
      <circle cx="0" cy="-30" r="4" fill="#ffffff" opacity="0.9"/>
      
      <circle cx="-20" cy="-20" r="4" fill="url(#royalDiamond)" filter="url(#royalGlow)"/>
      <circle cx="20" cy="-20" r="4" fill="url(#royalDiamond)" filter="url(#royalGlow)"/>
      <circle cx="13" cy="-25" r="3.5" fill="url(#royalDiamond)" filter="url(#royalGlow)"/>
      <circle cx="-13" cy="-25" r="3.5" fill="url(#royalDiamond)" filter="url(#royalGlow)"/>
      
      <!-- Delicate accent stones -->
      <circle cx="-30" cy="-15" r="2" fill="#E8F4F8"/>
      <circle cx="30" cy="-15" r="2" fill="#E8F4F8"/>
      <circle cx="0" cy="-15" r="2" fill="#E8F4F8"/>
    </g>
    
    <!-- Product info -->
    <text x="0" y="120" font-family="'Playfair Display', serif" font-size="18" fill="#2C2C2C" text-anchor="middle" font-weight="500">
      Princess Crown Ring
    </text>
    <text x="0" y="140" font-family="'Montserrat', sans-serif" font-size="12" fill="#87A96B" text-anchor="middle">
      0.55 carat lab-grown diamonds
    </text>
    <text x="0" y="160" font-family="'Montserrat', sans-serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="600">
      $1,950
    </text>
  </g>
  
  <!-- Collection features -->
  <g transform="translate(600, 580)">
    <rect x="-400" y="0" width="800" height="150" rx="10" fill="#F8F6F0" opacity="0.5"/>
    
    <text x="0" y="30" font-family="'Playfair Display', serif" font-size="20" fill="#2C2C2C" text-anchor="middle" font-weight="500">
      Crown Collection Features
    </text>
    
    <!-- Feature points -->
    <g transform="translate(-200, 60)">
      <circle cx="0" cy="0" r="3" fill="#D4AF37"/>
      <text x="15" y="5" font-family="'Montserrat', sans-serif" font-size="12" fill="#2C2C2C">
        Handcrafted 18k gold settings
      </text>
    </g>
    
    <g transform="translate(0, 60)">
      <circle cx="0" cy="0" r="3" fill="#D4AF37"/>
      <text x="15" y="5" font-family="'Montserrat', sans-serif" font-size="12" fill="#2C2C2C">
        Premium lab-grown diamonds
      </text>
    </g>
    
    <g transform="translate(200, 60)">
      <circle cx="0" cy="0" r="3" fill="#D4AF37"/>
      <text x="15" y="5" font-family="'Montserrat', sans-serif" font-size="12" fill="#2C2C2C">
        Lifetime warranty included
      </text>
    </g>
    
    <g transform="translate(-100, 100)">
      <circle cx="0" cy="0" r="3" fill="#D4AF37"/>
      <text x="15" y="5" font-family="'Montserrat', sans-serif" font-size="12" fill="#2C2C2C">
        Available in all sizes
      </text>
    </g>
    
    <g transform="translate(100, 100)">
      <circle cx="0" cy="0" r="3" fill="#D4AF37"/>
      <text x="15" y="5" font-family="'Montserrat', sans-serif" font-size="12" fill="#2C2C2C">
        Ethically created
      </text>
    </g>
  </g>
  
  <!-- Ambient sparkles -->
  <g opacity="0.4">
    <path d="M150,150 L155,155 L150,160 L145,155 Z" fill="#D4AF37"/>
    <path d="M1050,200 L1055,205 L1050,210 L1045,205 Z" fill="#ffffff"/>
    <path d="M80,400 L85,405 L80,410 L75,405 Z" fill="#E8F4F8"/>
    <circle cx="1120" cy="350" r="2" fill="#87A96B"/>
    <circle cx="50" cy="600" r="1.5" fill="#F5E6E8"/>
    <circle cx="1150" cy="550" r="1" fill="#D4AF37"/>
  </g>
</svg>