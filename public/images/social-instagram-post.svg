<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="instaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6E8"/>
      <stop offset="50%" style="stop-color:#E8F4F8"/>
      <stop offset="100%" style="stop-color:#87A96B"/>
    </linearGradient>
    <radialGradient id="centerSparkle" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#D4AF37;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#87A96B;stop-opacity:0.3"/>
    </radialGradient>
    <filter id="instaGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#instaGrad)"/>
  
  <!-- Main featured ring -->
  <g transform="translate(540, 440)">
    <!-- Ring shadow -->
    <ellipse cx="0" cy="100" rx="180" ry="40" fill="#000000" opacity="0.08"/>
    
    <!-- Ring band -->
    <ellipse cx="0" cy="60" rx="140" ry="20" fill="#E5E4E2"/>
    <ellipse cx="0" cy="58" rx="135" ry="18" fill="#F8F6F0"/>
    
    <!-- Diamond setting -->
    <g transform="translate(0, 20)">
      <circle cx="0" cy="0" r="25" fill="#E5E4E2"/>
      <circle cx="0" cy="-2" r="22" fill="#F8F6F0"/>
      
      <!-- Prongs -->
      <rect x="-2" y="-35" width="4" height="15" fill="#E5E4E2"/>
      <rect x="-2" y="-35" width="4" height="15" fill="#E5E4E2" transform="rotate(60)"/>
      <rect x="-2" y="-35" width="4" height="15" fill="#E5E4E2" transform="rotate(120)"/>
      <rect x="-2" y="-35" width="4" height="15" fill="#E5E4E2" transform="rotate(180)"/>
      <rect x="-2" y="-35" width="4" height="15" fill="#E5E4E2" transform="rotate(240)"/>
      <rect x="-2" y="-35" width="4" height="15" fill="#E5E4E2" transform="rotate(300)"/>
    </g>
    
    <!-- Main diamond -->
    <g transform="translate(0, -5)">
      <circle cx="0" cy="0" r="35" fill="url(#centerSparkle)" filter="url(#instaGlow)"/>
      <polygon points="0,-30 -20,-10 -10,15 10,15 20,-10" fill="#ffffff" opacity="0.9"/>
      <polygon points="0,-30 -10,-18 0,-12 10,-18" fill="#ffffff" opacity="0.8"/>
      <polygon points="-20,-10 -10,15 0,8 0,-12" fill="#E8F4F8" opacity="0.7"/>
      <polygon points="20,-10 10,15 0,8 0,-12" fill="#E8F4F8" opacity="0.6"/>
      
      <!-- Brilliant highlights -->
      <circle cx="-8" cy="-18" r="3" fill="#ffffff"/>
      <circle cx="6" cy="-15" r="2" fill="#ffffff"/>
      <circle cx="-3" cy="-10" r="1.5" fill="#ffffff"/>
      <circle cx="10" cy="-8" r="2.5" fill="#ffffff" opacity="0.7"/>
    </g>
    
    <!-- Surrounding sparkles -->
    <g opacity="0.7">
      <path d="M-100,-50 L-95,-45 L-100,-40 L-105,-45 Z" fill="#D4AF37"/>
      <path d="M110,-40 L115,-35 L110,-30 L105,-35 Z" fill="#ffffff"/>
      <path d="M-90,80 L-85,85 L-90,90 L-95,85 Z" fill="#E8F4F8"/>
      <path d="M120,70 L125,75 L120,80 L115,75 Z" fill="#F5E6E8"/>
      
      <circle cx="-120" cy="0" r="3" fill="#D4AF37"/>
      <circle cx="130" cy="10" r="2" fill="#ffffff"/>
      <circle cx="-80" cy="120" r="2.5" fill="#E8F4F8"/>
      <circle cx="100" cy="110" r="1.5" fill="#87A96B"/>
    </g>
  </g>
  
  <!-- Text content -->
  <g transform="translate(540, 750)">
    <text x="0" y="0" font-family="'Playfair Display', serif" font-size="48" fill="#2C2C2C" font-weight="600" text-anchor="middle">
      Timeless Beauty
    </text>
    <text x="0" y="50" font-family="'Montserrat', sans-serif" font-size="20" fill="#2C2C2C" opacity="0.8" text-anchor="middle">
      Lab-grown diamonds that shine forever
    </text>
    <text x="0" y="80" font-family="'Montserrat', sans-serif" font-size="16" fill="#87A96B" text-anchor="middle">
      #bonjoojoo #labgrowndiamonds #consciousluxury
    </text>
  </g>
  
  <!-- Call to action -->
  <g transform="translate(540, 950)">
    <rect x="-100" y="-25" width="200" height="50" rx="25" fill="#2C2C2C"/>
    <text x="0" y="5" font-family="'Montserrat', sans-serif" font-size="16" fill="#ffffff" font-weight="500" text-anchor="middle">
      SHOP NOW
    </text>
  </g>
  
  <!-- Brand mark in corner -->
  <g transform="translate(80, 80)">
    <polygon points="0,-12 -8,-3 -4,8 4,8 8,-3" fill="#ffffff" opacity="0.7"/>
    <text x="20" y="5" font-family="'Montserrat', sans-serif" font-size="14" fill="#ffffff" font-weight="500">
      bonjoojoo
    </text>
  </g>
  
  <!-- Decorative corner elements -->
  <g opacity="0.3">
    <circle cx="50" cy="1030" r="2" fill="#D4AF37"/>
    <circle cx="1030" cy="50" r="1.5" fill="#ffffff"/>
    <circle cx="1030" cy="1030" r="2" fill="#E8F4F8"/>
    <circle cx="50" cy="50" r="1" fill="#87A96B"/>
  </g>
</svg>