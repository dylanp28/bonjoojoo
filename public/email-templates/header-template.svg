<svg width="600" height="150" viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Email Header Template -->
  <defs>
    <linearGradient id="emailGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F8F6F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F4F8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="150" fill="url(#emailGradient)"/>
  
  <!-- Logo and Brand -->
  <g transform="translate(50, 50)">
    <!-- Diamond Icon -->
    <polygon points="30,20 40,30 30,50 20,30" fill="#D4AF37" stroke="#2C2C2C" stroke-width="1"/>
    <polygon points="30,20 35,25 30,30 25,25" fill="#FFFFFF" opacity="0.7"/>
    
    <!-- Brand Name -->
    <text x="60" y="40" font-family="Playfair Display, serif" font-size="32" font-weight="400" fill="#2C2C2C">bonjoojoo</text>
    
    <!-- Tagline -->
    <text x="60" y="55" font-family="Montserrat, sans-serif" font-size="12" font-weight="300" fill="#6B8A6B" letter-spacing="1px">CONSCIOUS LUXURY</text>
  </g>
  
  <!-- Navigation Links -->
  <g transform="translate(350, 60)">
    <text x="0" y="0" font-family="Montserrat, sans-serif" font-size="12" font-weight="500" fill="#2C2C2C">Shop</text>
    <text x="50" y="0" font-family="Montserrat, sans-serif" font-size="12" font-weight="500" fill="#2C2C2C">About</text>
    <text x="100" y="0" font-family="Montserrat, sans-serif" font-size="12" font-weight="500" fill="#2C2C2C">Education</text>
    <text x="170" y="0" font-family="Montserrat, sans-serif" font-size="12" font-weight="500" fill="#2C2C2C">Contact</text>
  </g>
  
  <!-- Decorative Elements -->
  <g opacity="0.2">
    <circle cx="520" cy="40" r="2" fill="#D4AF37"/>
    <circle cx="550" cy="70" r="1.5" fill="#E8B4B8"/>
    <circle cx="480" cy="100" r="1" fill="#87A96B"/>
  </g>
  
  <!-- Bottom Border -->
  <line x1="0" y1="149" x2="600" y2="149" stroke="#D4AF37" stroke-width="2"/>
</svg>