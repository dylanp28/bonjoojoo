<svg width="800" height="1200" viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Lab-Grown vs Mined Diamond Comparison Infographic -->
  <rect width="800" height="1200" fill="#F8F6F0"/>
  
  <!-- Header -->
  <text x="400" y="60" font-family="Playfair Display, serif" font-size="32" font-weight="600" fill="#2C2C2C" text-anchor="middle">Lab-Grown vs. Mined Diamonds</text>
  <text x="400" y="90" font-family="Montserrat, sans-serif" font-size="16" fill="#6B8A6B" text-anchor="middle">The facts behind your conscious choice</text>
  
  <!-- Lab-Grown Section -->
  <g id="lab-grown-section">
    <!-- Background -->
    <rect x="50" y="130" width="300" height="450" rx="10" fill="#E8F4F8" stroke="#87A96B" stroke-width="2"/>
    
    <!-- Title -->
    <text x="200" y="165" font-family="Playfair Display, serif" font-size="24" font-weight="600" fill="#2C2C2C" text-anchor="middle">Lab-Grown</text>
    
    <!-- Diamond Illustration -->
    <g transform="translate(175, 180)">
      <polygon points="25,20 35,30 25,50 15,30" fill="#D4AF37" stroke="#2C2C2C" stroke-width="1"/>
      <polygon points="25,20 30,25 25,30 20,25" fill="#FFFFFF" opacity="0.7"/>
      <!-- Growth process arrows -->
      <path d="M 10 35 Q 0 25 10 15" stroke="#87A96B" stroke-width="1" fill="none" marker-end="url(#arrowhead)"/>
      <path d="M 40 35 Q 50 25 40 15" stroke="#87A96B" stroke-width="1" fill="none" marker-end="url(#arrowhead)"/>
    </g>
    
    <!-- Features List -->
    <g font-family="Montserrat, sans-serif" font-size="14" fill="#2C2C2C">
      <!-- Environment -->
      <circle cx="80" cy="270" r="3" fill="#87A96B"/>
      <text x="95" y="275">Minimal environmental impact</text>
      
      <!-- Ethics -->
      <circle cx="80" cy="300" r="3" fill="#87A96B"/>
      <text x="95" y="305">Conflict-free guarantee</text>
      
      <!-- Quality -->
      <circle cx="80" cy="330" r="3" fill="#87A96B"/>
      <text x="95" y="335">Identical chemical composition</text>
      
      <!-- Value -->
      <circle cx="80" cy="360" r="3" fill="#87A96B"/>
      <text x="95" y="365">30-40% more value</text>
      
      <!-- Innovation -->
      <circle cx="80" cy="390" r="3" fill="#87A96B"/>
      <text x="95" y="395">Advanced technology</text>
      
      <!-- Traceability -->
      <circle cx="80" cy="420" r="3" fill="#87A96B"/>
      <text x="95" y="425">Complete origin tracking</text>
    </g>
    
    <!-- Process -->
    <text x="200" y="470" font-family="Montserrat, sans-serif" font-size="12" font-weight="500" fill="#6B8A6B" text-anchor="middle">Created in 2-4 weeks</text>
    <text x="200" y="490" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B" text-anchor="middle">in controlled laboratory</text>
    
    <!-- Sustainability Score -->
    <rect x="80" y="510" width="240" height="30" rx="15" fill="#87A96B"/>
    <text x="200" y="530" font-family="Montserrat, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">SUSTAINABILITY: 95%</text>
  </g>
  
  <!-- Mined Section -->
  <g id="mined-section">
    <!-- Background -->
    <rect x="450" y="130" width="300" height="450" rx="10" fill="#F5E6E8" stroke="#E8B4B8" stroke-width="2"/>
    
    <!-- Title -->
    <text x="600" y="165" font-family="Playfair Display, serif" font-size="24" font-weight="600" fill="#2C2C2C" text-anchor="middle">Mined</text>
    
    <!-- Diamond Illustration -->
    <g transform="translate(575, 180)">
      <polygon points="25,20 35,30 25,50 15,30" fill="#D4AF37" stroke="#2C2C2C" stroke-width="1"/>
      <polygon points="25,20 30,25 25,30 20,25" fill="#FFFFFF" opacity="0.7"/>
      <!-- Mining equipment -->
      <rect x="10" y="55" width="30" height="10" fill="#2C2C2C"/>
      <text x="25" y="72" font-family="Montserrat, sans-serif" font-size="8" fill="#2C2C2C" text-anchor="middle">MINE</text>
    </g>
    
    <!-- Features List -->
    <g font-family="Montserrat, sans-serif" font-size="14" fill="#2C2C2C">
      <!-- Environment -->
      <circle cx="480" cy="270" r="3" fill="#E8B4B8"/>
      <text x="495" y="275">Significant environmental impact</text>
      
      <!-- Ethics -->
      <circle cx="480" cy="300" r="3" fill="#E8B4B8"/>
      <text x="495" y="305">Potential ethical concerns</text>
      
      <!-- Quality -->
      <circle cx="480" cy="330" r="3" fill="#E8B4B8"/>
      <text x="495" y="335">Identical chemical composition</text>
      
      <!-- Value -->
      <circle cx="480" cy="360" r="3" fill="#E8B4B8"/>
      <text x="495" y="365">Traditional market pricing</text>
      
      <!-- Rarity -->
      <circle cx="480" cy="390" r="3" fill="#E8B4B8"/>
      <text x="495" y="395">Natural formation rarity</text>
      
      <!-- Supply Chain -->
      <circle cx="480" cy="420" r="3" fill="#E8B4B8"/>
      <text x="495" y="425">Complex supply chain</text>
    </g>
    
    <!-- Process -->
    <text x="600" y="470" font-family="Montserrat, sans-serif" font-size="12" font-weight="500" fill="#6B8A6B" text-anchor="middle">Formed over billions of years</text>
    <text x="600" y="490" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B" text-anchor="middle">deep in the Earth</text>
    
    <!-- Sustainability Score -->
    <rect x="480" y="510" width="240" height="30" rx="15" fill="#E8B4B8"/>
    <text x="600" y="530" font-family="Montserrat, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">SUSTAINABILITY: 25%</text>
  </g>
  
  <!-- Comparison Section -->
  <g id="comparison">
    <text x="400" y="650" font-family="Playfair Display, serif" font-size="28" font-weight="600" fill="#2C2C2C" text-anchor="middle">The Choice is Clear</text>
    
    <!-- Quality Comparison -->
    <rect x="100" y="680" width="600" height="60" rx="10" fill="#FFFFFF" stroke="#D4AF37" stroke-width="1"/>
    <text x="120" y="705" font-family="Montserrat, sans-serif" font-size="16" font-weight="600" fill="#2C2C2C">Physical & Chemical Properties</text>
    <text x="120" y="725" font-family="Montserrat, sans-serif" font-size="14" fill="#6B8A6B">100% identical - Same hardness, brilliance, and fire</text>
    
    <!-- Environmental Impact -->
    <g transform="translate(0, 80)">
      <rect x="100" y="680" width="600" height="120" rx="10" fill="#E8F4F8" stroke="#87A96B" stroke-width="1"/>
      <text x="120" y="705" font-family="Montserrat, sans-serif" font-size="16" font-weight="600" fill="#2C2C2C">Environmental Impact</text>
      
      <!-- Lab-grown bar -->
      <rect x="120" y="720" width="100" height="20" rx="10" fill="#87A96B"/>
      <text x="125" y="735" font-family="Montserrat, sans-serif" font-size="12" fill="#FFFFFF">Lab-Grown</text>
      
      <!-- Mined bar -->
      <rect x="120" y="750" width="400" height="20" rx="10" fill="#E8B4B8"/>
      <text x="125" y="765" font-family="Montserrat, sans-serif" font-size="12" fill="#FFFFFF">Mined</text>
      
      <text x="120" y="785" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B">Lab-grown diamonds require 80% less energy and water</text>
    </g>
  </g>
  
  <!-- Footer -->
  <g transform="translate(300, 1050)">
    <polygon points="30,15 40,25 30,45 20,25" fill="#D4AF37" stroke="#2C2C2C" stroke-width="0.5"/>
    <text x="60" y="35" font-family="Playfair Display, serif" font-size="20" fill="#2C2C2C">bonjoojoo</text>
    <text x="10" y="65" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B">Making luxury sustainable, one diamond at a time</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#87A96B"/>
    </marker>
  </defs>
</svg>