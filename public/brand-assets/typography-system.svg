<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Typography System Guide -->
  <rect width="800" height="600" fill="#F8F6F0"/>
  
  <!-- Title -->
  <text x="40" y="50" font-family="Playfair Display, serif" font-size="28" font-weight="600" fill="#2C2C2C">Bonjoojoo Typography System</text>
  
  <!-- Primary Typography - Playfair Display -->
  <text x="40" y="100" font-family="Montserrat, sans-serif" font-size="16" font-weight="600" fill="#6B8A6B">PRIMARY TYPEFACE</text>
  <text x="40" y="130" font-family="Playfair Display, serif" font-size="48" font-weight="400" fill="#2C2C2C">Playfair Display</text>
  <text x="40" y="155" font-family="Playfair Display, serif" font-size="24" font-weight="400" fill="#87A96B">Elegant serif for headlines and brand statements</text>
  
  <!-- Size Hierarchy -->
  <text x="40" y="200" font-family="Playfair Display, serif" font-size="36" font-weight="600" fill="#2C2C2C">H1 Headline - 36px Bold</text>
  <text x="40" y="230" font-family="Playfair Display, serif" font-size="28" font-weight="500" fill="#2C2C2C">H2 Subheading - 28px Medium</text>
  <text x="40" y="255" font-family="Playfair Display, serif" font-size="24" font-weight="400" fill="#2C2C2C">H3 Section - 24px Regular</text>
  
  <!-- Secondary Typography - Montserrat -->
  <text x="40" y="310" font-family="Montserrat, sans-serif" font-size="16" font-weight="600" fill="#6B8A6B">SECONDARY TYPEFACE</text>
  <text x="40" y="340" font-family="Montserrat, sans-serif" font-size="32" font-weight="600" fill="#2C2C2C">Montserrat</text>
  <text x="40" y="365" font-family="Montserrat, sans-serif" font-size="16" font-weight="400" fill="#87A96B">Clean sans-serif for body text and navigation</text>
  
  <!-- Body Text Samples -->
  <text x="40" y="400" font-family="Montserrat, sans-serif" font-size="16" font-weight="500" fill="#2C2C2C">Body Bold - 16px Medium</text>
  <text x="40" y="425" font-family="Montserrat, sans-serif" font-size="16" font-weight="400" fill="#2C2C2C">Body Regular - 16px Regular</text>
  <text x="40" y="450" font-family="Montserrat, sans-serif" font-size="14" font-weight="400" fill="#6B8A6B">Body Small - 14px Regular</text>
  <text x="40" y="475" font-family="Montserrat, sans-serif" font-size="12" font-weight="300" fill="#87A96B">Caption - 12px Light</text>
  
  <!-- Accent Typography - Allura -->
  <text x="40" y="520" font-family="Montserrat, sans-serif" font-size="16" font-weight="600" fill="#6B8A6B">ACCENT TYPEFACE</text>
  <text x="40" y="550" font-family="serif" font-size="28" font-weight="400" fill="#D4AF37" font-style="italic">Allura Script</text>
  <text x="40" y="575" font-family="Montserrat, sans-serif" font-size="14" font-weight="400" fill="#87A96B">Delicate script for special occasions and luxury touches</text>
</svg>