<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Engagement Ring Hero Product Image -->
  <defs>
    <!-- Gradients for luxury lighting -->
    <radialGradient id="diamondSparkle" cx="50%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#E8B4B8;stop-opacity:0.1" />
    </radialGradient>
    
    <linearGradient id="bandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F0F0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D0D0D0;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="backgroundGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#F8F6F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F4F8;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Luxury Background -->
  <rect width="800" height="800" fill="url(#backgroundGlow)"/>
  
  <!-- Soft Shadow/Base -->
  <ellipse cx="400" cy="650" rx="200" ry="40" fill="#2C2C2C" opacity="0.1"/>
  
  <!-- Ring Band -->
  <g transform="translate(400, 400)">
    <!-- Main band structure -->
    <ellipse cx="0" cy="0" rx="150" ry="40" fill="url(#bandGradient)" stroke="#C0C0C0" stroke-width="2"/>
    
    <!-- Inner band -->
    <ellipse cx="0" cy="0" rx="130" ry="30" fill="transparent" stroke="#B0B0B0" stroke-width="1"/>
    
    <!-- Band highlights -->
    <ellipse cx="-20" cy="-10" rx="30" ry="8" fill="#FFFFFF" opacity="0.4"/>
    <ellipse cx="40" cy="-5" rx="25" ry="6" fill="#FFFFFF" opacity="0.3"/>
  </g>
  
  <!-- Prong Setting -->
  <g transform="translate(400, 350)">
    <!-- Prongs -->
    <rect x="-25" y="-15" width="4" height="30" fill="#E8E8E8" transform="rotate(-15)"/>
    <rect x="21" y="-15" width="4" height="30" fill="#E8E8E8" transform="rotate(15)"/>
    <rect x="-2" y="-25" width="4" height="30" fill="#E8E8E8"/>
    <rect x="-2" y="0" width="4" height="20" fill="#E8E8E8"/>
    
    <!-- Setting base -->
    <circle cx="0" cy="0" r="18" fill="url(#bandGradient)" stroke="#C0C0C0" stroke-width="1"/>
  </g>
  
  <!-- Main Diamond -->
  <g transform="translate(400, 320)">
    <!-- Diamond base -->
    <polygon points="0,-30 20,-10 15,15 -15,15 -20,-10" fill="url(#diamondSparkle)" stroke="#D4AF37" stroke-width="0.5" opacity="0.95"/>
    
    <!-- Top facets -->
    <polygon points="0,-30 10,-20 0,-10 -10,-20" fill="#FFFFFF" opacity="0.8"/>
    <polygon points="10,-20 20,-10 0,-10" fill="#F8F6F0" opacity="0.6"/>
    <polygon points="-10,-20 0,-10 -20,-10" fill="#E8F4F8" opacity="0.6"/>
    
    <!-- Side facets -->
    <polygon points="0,-10 20,-10 15,15 0,5" fill="#D4AF37" opacity="0.4"/>
    <polygon points="0,-10 0,5 -15,15 -20,-10" fill="#E8B4B8" opacity="0.3"/>
    
    <!-- Brilliant sparkle effects -->
    <circle cx="-8" cy="-15" r="2" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="12" cy="-5" r="1.5" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="5" cy="5" r="1" fill="#D4AF37" opacity="0.8"/>
    <circle cx="-5" cy="8" r="1.5" fill="#FFFFFF" opacity="0.6"/>
    
    <!-- Diamond sparkle rays -->
    <line x1="-15" y1="-20" x2="-25" y2="-30" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
    <line x1="15" y1="-15" x2="25" y2="-25" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
    <line x1="8" y1="10" x2="18" y2="20" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
    <line x1="-10" y1="12" x2="-20" y2="22" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Accent Diamonds on Band -->
  <g transform="translate(400, 400)">
    <!-- Left accent diamonds -->
    <g transform="translate(-80, 0)">
      <polygon points="0,-8 5,-3 3,5 -3,5 -5,-3" fill="#FFFFFF" stroke="#D4AF37" stroke-width="0.3" opacity="0.8"/>
      <circle cx="0" cy="-2" r="0.5" fill="#FFFFFF" opacity="0.9"/>
    </g>
    <g transform="translate(-110, 5)">
      <polygon points="0,-6 4,-2 2,4 -2,4 -4,-2" fill="#FFFFFF" stroke="#D4AF37" stroke-width="0.3" opacity="0.7"/>
    </g>
    
    <!-- Right accent diamonds -->
    <g transform="translate(80, 0)">
      <polygon points="0,-8 5,-3 3,5 -3,5 -5,-3" fill="#FFFFFF" stroke="#D4AF37" stroke-width="0.3" opacity="0.8"/>
      <circle cx="0" cy="-2" r="0.5" fill="#FFFFFF" opacity="0.9"/>
    </g>
    <g transform="translate(110, 5)">
      <polygon points="0,-6 4,-2 2,4 -2,4 -4,-2" fill="#FFFFFF" stroke="#D4AF37" stroke-width="0.3" opacity="0.7"/>
    </g>
  </g>
  
  <!-- Luxury Lighting Effects -->
  <g opacity="0.3">
    <ellipse cx="300" cy="200" rx="100" ry="200" fill="#FFFFFF" opacity="0.1" transform="rotate(45 300 200)"/>
    <ellipse cx="500" cy="600" rx="80" ry="150" fill="#D4AF37" opacity="0.05" transform="rotate(-30 500 600)"/>
  </g>
  
  <!-- Product Information Overlay -->
  <g transform="translate(50, 50)" opacity="0.8">
    <rect width="200" height="80" rx="10" fill="#FFFFFF" opacity="0.9" stroke="#D4AF37" stroke-width="1"/>
    <text x="20" y="25" font-family="Playfair Display, serif" font-size="16" font-weight="600" fill="#2C2C2C">Classic Solitaire</text>
    <text x="20" y="40" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B">1.5ct Lab-Grown Diamond</text>
    <text x="20" y="55" font-family="Montserrat, sans-serif" font-size="10" fill="#87A96B">18k White Gold Setting</text>
    <text x="20" y="70" font-family="Montserrat, sans-serif" font-size="10" fill="#87A96B">Conflict-Free Certified</text>
  </g>
</svg>