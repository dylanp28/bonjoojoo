<svg width="500" height="600" viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Diamond Earrings Hero Product Image -->
  <defs>
    <radialGradient id="earringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F8F6F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F4F8;stop-opacity:1" />
    </radialGradient>
    
    <radialGradient id="diamondBrilliance" cx="50%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#D4AF37;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0.1" />
    </radialGradient>
    
    <linearGradient id="settingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F0F0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D0D0D0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="600" fill="url(#earringGlow)"/>
  
  <!-- Left Earring -->
  <g transform="translate(150, 200)">
    <!-- Post -->
    <rect x="-1" y="-15" width="2" height="10" fill="#C0C0C0"/>
    
    <!-- Setting -->
    <circle cx="0" cy="0" r="12" fill="url(#settingGradient)" stroke="#C0C0C0" stroke-width="1"/>
    
    <!-- Prongs -->
    <line x1="-8" y1="-8" x2="-6" y2="-6" stroke="#C0C0C0" stroke-width="1"/>
    <line x1="8" y1="-8" x2="6" y2="-6" stroke="#C0C0C0" stroke-width="1"/>
    <line x1="-8" y1="8" x2="-6" y2="6" stroke="#C0C0C0" stroke-width="1"/>
    <line x1="8" y1="8" x2="6" y2="6" stroke="#C0C0C0" stroke-width="1"/>
    
    <!-- Diamond -->
    <polygon points="0,-12 8,-4 6,8 -6,8 -8,-4" fill="url(#diamondBrilliance)" stroke="#D4AF37" stroke-width="0.5"/>
    
    <!-- Facets -->
    <polygon points="0,-12 4,-8 0,-4 -4,-8" fill="#FFFFFF" opacity="0.9"/>
    <polygon points="4,-8 8,-4 0,-4" fill="#F8F6F0" opacity="0.7"/>
    <polygon points="-4,-8 0,-4 -8,-4" fill="#E8F4F8" opacity="0.7"/>
    <polygon points="0,-4 8,-4 6,8 0,4" fill="#D4AF37" opacity="0.4"/>
    <polygon points="0,-4 0,4 -6,8 -8,-4" fill="#E8B4B8" opacity="0.3"/>
    
    <!-- Sparkle effects -->
    <circle cx="-3" cy="-6" r="1" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="5" cy="-1" r="0.8" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="2" cy="4" r="0.6" fill="#D4AF37" opacity="0.8"/>
    
    <!-- Sparkle rays -->
    <line x1="-6" y1="-10" x2="-10" y2="-14" stroke="#FFFFFF" stroke-width="0.8" opacity="0.6"/>
    <line x1="7" y1="-6" x2="11" y2="-10" stroke="#FFFFFF" stroke-width="0.8" opacity="0.5"/>
    <line x1="4" y1="6" x2="8" y2="10" stroke="#D4AF37" stroke-width="0.8" opacity="0.4"/>
  </g>
  
  <!-- Right Earring -->
  <g transform="translate(350, 200)">
    <!-- Post -->
    <rect x="-1" y="-15" width="2" height="10" fill="#C0C0C0"/>
    
    <!-- Setting -->
    <circle cx="0" cy="0" r="12" fill="url(#settingGradient)" stroke="#C0C0C0" stroke-width="1"/>
    
    <!-- Prongs -->
    <line x1="-8" y1="-8" x2="-6" y2="-6" stroke="#C0C0C0" stroke-width="1"/>
    <line x1="8" y1="-8" x2="6" y2="-6" stroke="#C0C0C0" stroke-width="1"/>
    <line x1="-8" y1="8" x2="-6" y2="6" stroke="#C0C0C0" stroke-width="1"/>
    <line x1="8" y1="8" x2="6" y2="6" stroke="#C0C0C0" stroke-width="1"/>
    
    <!-- Diamond -->
    <polygon points="0,-12 8,-4 6,8 -6,8 -8,-4" fill="url(#diamondBrilliance)" stroke="#D4AF37" stroke-width="0.5"/>
    
    <!-- Facets -->
    <polygon points="0,-12 4,-8 0,-4 -4,-8" fill="#FFFFFF" opacity="0.9"/>
    <polygon points="4,-8 8,-4 0,-4" fill="#F8F6F0" opacity="0.7"/>
    <polygon points="-4,-8 0,-4 -8,-4" fill="#E8F4F8" opacity="0.7"/>
    <polygon points="0,-4 8,-4 6,8 0,4" fill="#D4AF37" opacity="0.4"/>
    <polygon points="0,-4 0,4 -6,8 -8,-4" fill="#E8B4B8" opacity="0.3"/>
    
    <!-- Sparkle effects -->
    <circle cx="3" cy="-6" r="1" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="-5" cy="-1" r="0.8" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="-2" cy="4" r="0.6" fill="#D4AF37" opacity="0.8"/>
    
    <!-- Sparkle rays -->
    <line x1="6" y1="-10" x2="10" y2="-14" stroke="#FFFFFF" stroke-width="0.8" opacity="0.6"/>
    <line x1="-7" y1="-6" x2="-11" y2="-10" stroke="#FFFFFF" stroke-width="0.8" opacity="0.5"/>
    <line x1="-4" y1="6" x2="-8" y2="10" stroke="#D4AF37" stroke-width="0.8" opacity="0.4"/>
  </g>
  
  <!-- Drop earrings version -->
  <g transform="translate(150, 350)">
    <!-- Connection -->
    <rect x="-1" y="-20" width="2" height="15" fill="#C0C0C0"/>
    
    <!-- Top setting -->
    <circle cx="0" cy="-20" r="6" fill="url(#settingGradient)" stroke="#C0C0C0" stroke-width="0.5"/>
    <polygon points="0,-25 3,-22 2,-17 -2,-17 -3,-22" fill="#FFFFFF" stroke="#D4AF37" stroke-width="0.3" opacity="0.8"/>
    
    <!-- Drop setting -->
    <ellipse cx="0" cy="0" rx="10" ry="15" fill="url(#settingGradient)" stroke="#C0C0C0" stroke-width="1"/>
    
    <!-- Drop diamond -->
    <polygon points="0,-15 6,-3 4,12 -4,12 -6,-3" fill="url(#diamondBrilliance)" stroke="#D4AF37" stroke-width="0.5"/>
    
    <!-- Drop facets -->
    <polygon points="0,-15 3,-9 0,-3 -3,-9" fill="#FFFFFF" opacity="0.9"/>
    <polygon points="0,-3 6,-3 4,12 0,6" fill="#D4AF37" opacity="0.4"/>
    <polygon points="0,-3 0,6 -4,12 -6,-3" fill="#E8B4B8" opacity="0.3"/>
    
    <!-- Drop sparkles -->
    <circle cx="0" cy="-8" r="1" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="3" cy="3" r="0.8" fill="#FFFFFF" opacity="0.7"/>
  </g>
  
  <!-- Right drop earring -->
  <g transform="translate(350, 350)">
    <!-- Connection -->
    <rect x="-1" y="-20" width="2" height="15" fill="#C0C0C0"/>
    
    <!-- Top setting -->
    <circle cx="0" cy="-20" r="6" fill="url(#settingGradient)" stroke="#C0C0C0" stroke-width="0.5"/>
    <polygon points="0,-25 3,-22 2,-17 -2,-17 -3,-22" fill="#FFFFFF" stroke="#D4AF37" stroke-width="0.3" opacity="0.8"/>
    
    <!-- Drop setting -->
    <ellipse cx="0" cy="0" rx="10" ry="15" fill="url(#settingGradient)" stroke="#C0C0C0" stroke-width="1"/>
    
    <!-- Drop diamond -->
    <polygon points="0,-15 6,-3 4,12 -4,12 -6,-3" fill="url(#diamondBrilliance)" stroke="#D4AF37" stroke-width="0.5"/>
    
    <!-- Drop facets -->
    <polygon points="0,-15 3,-9 0,-3 -3,-9" fill="#FFFFFF" opacity="0.9"/>
    <polygon points="0,-3 6,-3 4,12 0,6" fill="#D4AF37" opacity="0.4"/>
    <polygon points="0,-3 0,6 -4,12 -6,-3" fill="#E8B4B8" opacity="0.3"/>
    
    <!-- Drop sparkles -->
    <circle cx="0" cy="-8" r="1" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="-3" cy="3" r="0.8" fill="#FFFFFF" opacity="0.7"/>
  </g>
  
  <!-- Product info -->
  <g transform="translate(50, 480)" opacity="0.9">
    <rect width="200" height="80" rx="10" fill="#FFFFFF" opacity="0.95" stroke="#D4AF37" stroke-width="1"/>
    <text x="15" y="25" font-family="Playfair Display, serif" font-size="16" font-weight="600" fill="#2C2C2C">Diamond Studs</text>
    <text x="15" y="45" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B">0.5ct Each Stone</text>
    <text x="15" y="60" font-family="Montserrat, sans-serif" font-size="10" fill="#87A96B">14k White Gold Setting</text>
  </g>
</svg>