<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Instagram Post Template - Product Showcase -->
  <defs>
    <linearGradient id="instagramGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F6F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F4F8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="productGlow" cx="50%" cy="50%" r="30%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#instagramGradient)"/>
  <circle cx="540" cy="540" r="300" fill="url(#productGlow)"/>
  
  <!-- Product Area -->
  <g id="product-showcase">
    <!-- Product Placeholder -->
    <circle cx="540" cy="400" r="150" fill="#FFFFFF" stroke="#D4AF37" stroke-width="2" opacity="0.8"/>
    <text x="540" y="410" font-family="Montserrat, sans-serif" font-size="16" fill="#6B8A6B" text-anchor="middle">Product Image</text>
    
    <!-- Diamond Accent -->
    <g transform="translate(620, 320)">
      <polygon points="20,15 25,20 20,30 15,20" fill="#D4AF37" stroke="#2C2C2C" stroke-width="0.5"/>
      <polygon points="20,15 22.5,17.5 20,20 17.5,17.5" fill="#FFFFFF" opacity="0.6"/>
    </g>
  </g>
  
  <!-- Content Area -->
  <g id="content-area">
    <!-- Brand Logo -->
    <g transform="translate(80, 80)">
      <polygon points="20,10 25,15 20,25 15,15" fill="#D4AF37" stroke="#2C2C2C" stroke-width="0.5"/>
      <text x="35" y="20" font-family="Playfair Display, serif" font-size="16" fill="#2C2C2C">bonjoojoo</text>
    </g>
    
    <!-- Main Message -->
    <text x="540" y="650" font-family="Playfair Display, serif" font-size="36" font-weight="600" fill="#2C2C2C" text-anchor="middle">
      <tspan x="540" dy="0">Conscious</tspan>
      <tspan x="540" dy="45">Luxury</tspan>
    </text>
    
    <!-- Supporting Text -->
    <text x="540" y="750" font-family="Montserrat, sans-serif" font-size="18" fill="#6B8A6B" text-anchor="middle">
      <tspan x="540" dy="0">Lab-grown diamonds that reflect</tspan>
      <tspan x="540" dy="25">your values without compromise</tspan>
    </text>
    
    <!-- CTA -->
    <rect x="390" y="820" width="300" height="50" rx="25" fill="#D4AF37"/>
    <text x="540" y="850" font-family="Montserrat, sans-serif" font-size="16" font-weight="500" fill="#FFFFFF" text-anchor="middle">Shop Collection</text>
    
    <!-- Website -->
    <text x="540" y="920" font-family="Montserrat, sans-serif" font-size="14" fill="#87A96B" text-anchor="middle">bonjoojoo.com</text>
    
    <!-- Hashtags -->
    <text x="540" y="960" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B" text-anchor="middle">#LabGrownDiamonds #ConsciousLuxury #SustainableJewelry</text>
  </g>
  
  <!-- Decorative Elements -->
  <g opacity="0.1">
    <circle cx="150" cy="200" r="3" fill="#D4AF37"/>
    <circle cx="930" cy="150" r="2" fill="#E8B4B8"/>
    <circle cx="100" cy="900" r="2.5" fill="#87A96B"/>
    <circle cx="980" cy="800" r="2" fill="#D4AF37"/>
  </g>
</svg>