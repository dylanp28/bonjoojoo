<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <!-- Instagram Story Template -->
  <defs>
    <linearGradient id="storyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4F8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F8F6F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5E6E8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#storyGradient)"/>
  
  <!-- Header -->
  <g id="story-header">
    <!-- Brand Logo -->
    <g transform="translate(80, 100)">
      <polygon points="25,15 35,25 25,45 15,25" fill="#D4AF37" stroke="#2C2C2C" stroke-width="1"/>
      <polygon points="25,15 30,20 25,25 20,20" fill="#FFFFFF" opacity="0.7"/>
      <text x="55" y="35" font-family="Playfair Display, serif" font-size="20" font-weight="500" fill="#2C2C2C">bonjoojoo</text>
    </g>
  </g>
  
  <!-- Main Content Area -->
  <g id="main-content">
    <!-- Product Showcase Area -->
    <rect x="140" y="300" width="800" height="800" rx="20" fill="#FFFFFF" opacity="0.8" stroke="#D4AF37" stroke-width="2"/>
    <text x="540" y="710" font-family="Montserrat, sans-serif" font-size="18" fill="#6B8A6B" text-anchor="middle">Product Image/Video</text>
    
    <!-- Feature Callouts -->
    <g transform="translate(140, 1150)">
      <rect width="800" height="200" rx="15" fill="#FFFFFF" opacity="0.9"/>
      
      <!-- Feature 1 -->
      <g transform="translate(50, 40)">
        <circle cx="20" cy="20" r="15" fill="#87A96B"/>
        <text x="20" y="26" font-family="Montserrat, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">1</text>
        <text x="50" y="16" font-family="Montserrat, sans-serif" font-size="16" font-weight="600" fill="#2C2C2C">Lab-Grown</text>
        <text x="50" y="32" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B">Identical to mined diamonds</text>
      </g>
      
      <!-- Feature 2 -->
      <g transform="translate(400, 40)">
        <circle cx="20" cy="20" r="15" fill="#E8B4B8"/>
        <text x="20" y="26" font-family="Montserrat, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">2</text>
        <text x="50" y="16" font-family="Montserrat, sans-serif" font-size="16" font-weight="600" fill="#2C2C2C">Ethical</text>
        <text x="50" y="32" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B">Conflict-free guarantee</text>
      </g>
      
      <!-- Feature 3 -->
      <g transform="translate(50, 100)">
        <circle cx="20" cy="20" r="15" fill="#D4AF37"/>
        <text x="20" y="26" font-family="Montserrat, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">3</text>
        <text x="50" y="16" font-family="Montserrat, sans-serif" font-size="16" font-weight="600" fill="#2C2C2C">Sustainable</text>
        <text x="50" y="32" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B">80% less environmental impact</text>
      </g>
      
      <!-- Feature 4 -->
      <g transform="translate(400, 100)">
        <circle cx="20" cy="20" r="15" fill="#87A96B"/>
        <text x="20" y="26" font-family="Montserrat, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">4</text>
        <text x="50" y="16" font-family="Montserrat, sans-serif" font-size="16" font-weight="600" fill="#2C2C2C">Value</text>
        <text x="50" y="32" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B">30-40% better value</text>
      </g>
    </g>
  </g>
  
  <!-- Call to Action -->
  <g id="cta-section">
    <!-- CTA Button -->
    <rect x="140" y="1450" width="800" height="80" rx="40" fill="#D4AF37"/>
    <text x="540" y="1500" font-family="Montserrat, sans-serif" font-size="24" font-weight="600" fill="#FFFFFF" text-anchor="middle">Swipe Up to Shop</text>
    
    <!-- Website -->
    <text x="540" y="1570" font-family="Montserrat, sans-serif" font-size="16" fill="#6B8A6B" text-anchor="middle">bonjoojoo.com</text>
  </g>
  
  <!-- Footer Message -->
  <g id="footer">
    <text x="540" y="1680" font-family="Playfair Display, serif" font-size="20" font-style="italic" fill="#2C2C2C" text-anchor="middle">
      <tspan x="540" dy="0">Luxury that aligns</tspan>
      <tspan x="540" dy="30">with your values</tspan>
    </text>
    
    <!-- Hashtags -->
    <text x="540" y="1760" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B" text-anchor="middle">#ConsciousLuxury #LabGrownDiamonds #SustainableJewelry</text>
  </g>
  
  <!-- Decorative Elements -->
  <g opacity="0.2">
    <circle cx="100" cy="400" r="4" fill="#D4AF37"/>
    <circle cx="980" cy="600" r="3" fill="#E8B4B8"/>
    <circle cx="150" cy="1200" r="3" fill="#87A96B"/>
    <circle cx="930" cy="1000" r="2" fill="#D4AF37"/>
  </g>
</svg>