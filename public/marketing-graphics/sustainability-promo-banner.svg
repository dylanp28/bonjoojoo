<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Sustainability Promotional Banner -->
  <defs>
    <linearGradient id="sustainabilityGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4F8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F8F6F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#87A96B;stop-opacity:0.1" />
    </linearGradient>
    
    <radialGradient id="leafGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#87A96B;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#87A96B;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#sustainabilityGradient)"/>
  <circle cx="950" cy="150" r="100" fill="url(#leafGlow)"/>
  
  <!-- Main Message -->
  <g id="main-message">
    <text x="80" y="100" font-family="Playfair Display, serif" font-size="48" font-weight="600" fill="#2C2C2C">
      <tspan x="80" dy="0">80% Less</tspan>
      <tspan x="80" dy="55">Environmental Impact</tspan>
    </text>
    
    <text x="80" y="200" font-family="Montserrat, sans-serif" font-size="18" fill="#6B8A6B">
      <tspan x="80" dy="0">Choose lab-grown diamonds for luxury</tspan>
      <tspan x="80" dy="25">that aligns with your values</tspan>
    </text>
    
    <!-- CTA Button -->
    <g transform="translate(80, 240)">
      <rect width="220" height="40" rx="20" fill="#87A96B"/>
      <text x="110" y="26" font-family="Montserrat, sans-serif" font-size="14" font-weight="500" fill="#FFFFFF" text-anchor="middle">Learn About Our Impact</text>
    </g>
  </g>
  
  <!-- Infographic Section -->
  <g id="comparison-visual">
    <!-- Lab-grown impact -->
    <g transform="translate(600, 80)">
      <text x="0" y="0" font-family="Montserrat, sans-serif" font-size="14" font-weight="600" fill="#2C2C2C">Lab-Grown Diamonds</text>
      
      <!-- Energy bar -->
      <rect x="0" y="15" width="80" height="12" rx="6" fill="#87A96B"/>
      <text x="90" y="25" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B">Energy</text>
      
      <!-- Water bar -->
      <rect x="0" y="35" width="60" height="12" rx="6" fill="#87A96B"/>
      <text x="70" y="45" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B">Water</text>
      
      <!-- Land bar -->
      <rect x="0" y="55" width="40" height="12" rx="6" fill="#87A96B"/>
      <text x="50" y="65" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B">Land</text>
    </g>
    
    <!-- Mined impact -->
    <g transform="translate(600, 150)">
      <text x="0" y="0" font-family="Montserrat, sans-serif" font-size="14" font-weight="600" fill="#2C2C2C">Mined Diamonds</text>
      
      <!-- Energy bar -->
      <rect x="0" y="15" width="300" height="12" rx="6" fill="#E8B4B8"/>
      <text x="310" y="25" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B">Energy</text>
      
      <!-- Water bar -->
      <rect x="0" y="35" width="280" height="12" rx="6" fill="#E8B4B8"/>
      <text x="290" y="45" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B">Water</text>
      
      <!-- Land bar -->
      <rect x="0" y="55" width="320" height="12" rx="6" fill="#E8B4B8"/>
      <text x="330" y="65" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B">Land</text>
    </g>
  </g>
  
  <!-- Decorative Elements -->
  <g id="eco-graphics">
    <!-- Leaf pattern -->
    <g transform="translate(980, 120)">
      <path d="M 0 0 C -5 -10, 5 -15, 15 -10 C 10 -5, 5 5, 0 0 Z" fill="#87A96B" opacity="0.6"/>
      <path d="M 0 0 L 7 -7" stroke="#6B8A6B" stroke-width="1"/>
    </g>
    
    <g transform="translate(1050, 180)">
      <path d="M 0 0 C -3 -8, 3 -12, 12 -8 C 8 -3, 3 3, 0 0 Z" fill="#87A96B" opacity="0.5"/>
      <path d="M 0 0 L 6 -5" stroke="#6B8A6B" stroke-width="1"/>
    </g>
    
    <!-- Diamond with eco accent -->
    <g transform="translate(1100, 80)">
      <polygon points="20,10 30,20 20,40 10,20" fill="#D4AF37" stroke="#87A96B" stroke-width="1"/>
      <polygon points="20,10 25,15 20,20 15,15" fill="#FFFFFF" opacity="0.7"/>
      <!-- Eco sparkle -->
      <circle cx="15" cy="15" r="2" fill="#87A96B" opacity="0.6"/>
    </g>
  </g>
  
  <!-- Statistics callout -->
  <g transform="translate(750, 250)">
    <text x="0" y="0" font-family="Montserrat, sans-serif" font-size="12" font-weight="600" fill="#2C2C2C">Compared to traditional mining:</text>
    <text x="0" y="15" font-family="Montserrat, sans-serif" font-size="11" fill="#6B8A6B">• 80% less energy consumption</text>
    <text x="0" y="28" font-family="Montserrat, sans-serif" font-size="11" fill="#6B8A6B">• 90% less water usage</text>
    <text x="200" y="15" font-family="Montserrat, sans-serif" font-size="11" fill="#6B8A6B">• No ecosystem disruption</text>
    <text x="200" y="28" font-family="Montserrat, sans-serif" font-size="11" fill="#6B8A6B">• Zero conflict guarantee</text>
  </g>
</svg>