<svg width="1920" height="800" viewBox="0 0 1920 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Hero Banner - Conscious Luxury Theme -->
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F6F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F4F8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="800" fill="url(#heroGradient)"/>
  <circle cx="1440" cy="200" r="300" fill="url(#centerGlow)"/>
  
  <!-- Decorative Elements -->
  <g opacity="0.3">
    <circle cx="1600" cy="150" r="2" fill="#D4AF37"/>
    <circle cx="1700" cy="300" r="1.5" fill="#E8B4B8"/>
    <circle cx="1500" cy="400" r="1" fill="#87A96B"/>
  </g>
  
  <!-- Main Content -->
  <g id="hero-content">
    <!-- Logo -->
    <g transform="translate(120, 80)">
      <polygon points="30,15 40,25 30,45 20,25" fill="#D4AF37" stroke="#2C2C2C" stroke-width="0.5"/>
      <polygon points="30,15 35,20 30,25 25,20" fill="#FFFFFF" opacity="0.6"/>
      <text x="60" y="35" font-family="Playfair Display, serif" font-size="24" font-weight="400" fill="#2C2C2C">bonjoojoo</text>
    </g>
    
    <!-- Main Headline -->
    <text x="120" y="300" font-family="Playfair Display, serif" font-size="72" font-weight="600" fill="#2C2C2C">
      <tspan x="120" dy="0">Conscious</tspan>
      <tspan x="120" dy="80">Luxury</tspan>
    </text>
    
    <!-- Subheading -->
    <text x="120" y="480" font-family="Montserrat, sans-serif" font-size="24" font-weight="400" fill="#6B8A6B">
      <tspan x="120" dy="0">Lab-grown diamonds that reflect</tspan>
      <tspan x="120" dy="35">your values without compromise</tspan>
    </text>
    
    <!-- CTA Button -->
    <g transform="translate(120, 580)">
      <rect width="200" height="50" rx="25" fill="#D4AF37"/>
      <text x="100" y="32" font-family="Montserrat, sans-serif" font-size="16" font-weight="500" fill="#FFFFFF" text-anchor="middle">Discover Collection</text>
    </g>
  </g>
  
  <!-- Product Illustration -->
  <g transform="translate(1200, 250)">
    <!-- Ring illustration -->
    <ellipse cx="150" cy="200" rx="120" ry="30" fill="#E5E4E2" opacity="0.3"/>
    <path d="M 50 200 Q 100 150 150 200 Q 200 150 250 200 Q 200 250 150 200 Q 100 250 50 200" fill="#D4AF37" stroke="#2C2C2C" stroke-width="2"/>
    <!-- Diamond on ring -->
    <polygon points="150,170 160,180 150,200 140,180" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="1"/>
    <polygon points="150,170 155,175 150,180 145,175" fill="#D4AF37" opacity="0.3"/>
  </g>
</svg>