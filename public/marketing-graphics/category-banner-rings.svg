<svg width="1920" height="400" viewBox="0 0 1920 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Category Banner - Rings -->
  <defs>
    <linearGradient id="ringBannerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5E6E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F4F8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="400" fill="url(#ringBannerGradient)"/>
  
  <!-- Content Container -->
  <g id="category-content">
    <!-- Title -->
    <text x="100" y="150" font-family="Playfair Display, serif" font-size="48" font-weight="600" fill="#2C2C2C">Engagement Rings</text>
    
    <!-- Subtitle -->
    <text x="100" y="190" font-family="Montserrat, sans-serif" font-size="18" fill="#6B8A6B">Forever begins with conscious choices</text>
    
    <!-- Features -->
    <g font-family="Montserrat, sans-serif" font-size="14" fill="#2C2C2C">
      <text x="100" y="240">✓ Lab-grown diamonds indistinguishable from mined</text>
      <text x="100" y="265">✓ Ethically sourced with full transparency</text>
      <text x="100" y="290">✓ Exceptional value without compromise</text>
    </g>
    
    <!-- CTA -->
    <g transform="translate(100, 320)">
      <rect width="180" height="40" rx="20" fill="#E8B4B8"/>
      <text x="90" y="26" font-family="Montserrat, sans-serif" font-size="14" font-weight="500" fill="#FFFFFF" text-anchor="middle">Browse Collection</text>
    </g>
  </g>
  
  <!-- Ring Illustrations -->
  <g transform="translate(1200, 80)">
    <!-- Ring 1 -->
    <g transform="translate(0, 50)">
      <ellipse cx="80" cy="120" rx="60" ry="15" fill="#E5E4E2" opacity="0.2"/>
      <path d="M 30 120 Q 55 90 80 120 Q 105 90 130 120 Q 105 150 80 120 Q 55 150 30 120" fill="#E5E4E2" stroke="#2C2C2C" stroke-width="1"/>
      <polygon points="80,105 85,110 80,120 75,110" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="0.5"/>
    </g>
    
    <!-- Ring 2 -->
    <g transform="translate(150, 20)">
      <ellipse cx="80" cy="120" rx="60" ry="15" fill="#D4AF37" opacity="0.2"/>
      <path d="M 30 120 Q 55 95 80 120 Q 105 95 130 120 Q 105 145 80 120 Q 55 145 30 120" fill="#D4AF37" stroke="#2C2C2C" stroke-width="1"/>
      <polygon points="80,110 87,115 80,125 73,115" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="0.5"/>
    </g>
    
    <!-- Ring 3 -->
    <g transform="translate(300, 60)">
      <ellipse cx="80" cy="120" rx="60" ry="15" fill="#E8B4B8" opacity="0.2"/>
      <path d="M 30 120 Q 55 85 80 120 Q 105 85 130 120 Q 105 155 80 120 Q 55 155 30 120" fill="#E8B4B8" stroke="#2C2C2C" stroke-width="1"/>
      <polygon points="80,100 88,108 80,125 72,108" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="0.5"/>
    </g>
  </g>
</svg>