<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Button States Design System -->
  <rect width="800" height="400" fill="#F8F6F0"/>
  
  <!-- Title -->
  <text x="20" y="40" font-family="Playfair Display, serif" font-size="24" font-weight="600" fill="#2C2C2C">Button States</text>
  
  <!-- Primary Buttons -->
  <text x="20" y="80" font-family="Montserrat, sans-serif" font-size="16" font-weight="600" fill="#6B8A6B">PRIMARY BUTTONS</text>
  
  <!-- Default State -->
  <g transform="translate(20, 100)">
    <rect width="200" height="50" rx="25" fill="#D4AF37"/>
    <text x="100" y="32" font-family="Montserrat, sans-serif" font-size="16" font-weight="500" fill="#FFFFFF" text-anchor="middle">Shop Collection</text>
    <text x="100" y="70" font-family="Montserrat, sans-serif" font-size="12" fill="#2C2C2C" text-anchor="middle">Default</text>
  </g>
  
  <!-- Hover State -->
  <g transform="translate(250, 100)">
    <rect width="200" height="50" rx="25" fill="#B8941F"/>
    <text x="100" y="32" font-family="Montserrat, sans-serif" font-size="16" font-weight="500" fill="#FFFFFF" text-anchor="middle">Shop Collection</text>
    <text x="100" y="70" font-family="Montserrat, sans-serif" font-size="12" fill="#2C2C2C" text-anchor="middle">Hover</text>
  </g>
  
  <!-- Active State -->
  <g transform="translate(480, 100)">
    <rect width="200" height="50" rx="25" fill="#9A7A1A"/>
    <text x="100" y="32" font-family="Montserrat, sans-serif" font-size="16" font-weight="500" fill="#FFFFFF" text-anchor="middle">Shop Collection</text>
    <text x="100" y="70" font-family="Montserrat, sans-serif" font-size="12" fill="#2C2C2C" text-anchor="middle">Active</text>
  </g>
  
  <!-- Secondary Buttons -->
  <text x="20" y="230" font-family="Montserrat, sans-serif" font-size="16" font-weight="600" fill="#6B8A6B">SECONDARY BUTTONS</text>
  
  <!-- Default State -->
  <g transform="translate(20, 250)">
    <rect width="200" height="50" rx="25" fill="transparent" stroke="#D4AF37" stroke-width="2"/>
    <text x="100" y="32" font-family="Montserrat, sans-serif" font-size="16" font-weight="500" fill="#D4AF37" text-anchor="middle">Learn More</text>
    <text x="100" y="70" font-family="Montserrat, sans-serif" font-size="12" fill="#2C2C2C" text-anchor="middle">Default</text>
  </g>
  
  <!-- Hover State -->
  <g transform="translate(250, 250)">
    <rect width="200" height="50" rx="25" fill="#D4AF37" stroke="#D4AF37" stroke-width="2"/>
    <text x="100" y="32" font-family="Montserrat, sans-serif" font-size="16" font-weight="500" fill="#FFFFFF" text-anchor="middle">Learn More</text>
    <text x="100" y="70" font-family="Montserrat, sans-serif" font-size="12" fill="#2C2C2C" text-anchor="middle">Hover</text>
  </g>
  
  <!-- Tertiary Buttons -->
  <g transform="translate(480, 250)">
    <rect width="200" height="50" rx="25" fill="transparent"/>
    <text x="100" y="32" font-family="Montserrat, sans-serif" font-size="16" font-weight="500" fill="#6B8A6B" text-anchor="middle">View Details</text>
    <text x="100" y="70" font-family="Montserrat, sans-serif" font-size="12" fill="#2C2C2C" text-anchor="middle">Text Link</text>
  </g>
</svg>