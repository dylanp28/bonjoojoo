<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon Library for UI -->
  <rect width="600" height="400" fill="#F8F6F0"/>
  
  <!-- Title -->
  <text x="20" y="30" font-family="Playfair Display, serif" font-size="20" font-weight="600" fill="#2C2C2C">Icon Library</text>
  
  <!-- Diamond Icons -->
  <text x="20" y="60" font-family="Montserrat, sans-serif" font-size="14" font-weight="600" fill="#6B8A6B">DIAMOND ICONS</text>
  
  <!-- Basic Diamond -->
  <g transform="translate(50, 80)">
    <polygon points="20,10 30,20 20,40 10,20" fill="#D4AF37" stroke="#2C2C2C" stroke-width="1"/>
    <polygon points="20,10 25,15 20,20 15,15" fill="#FFFFFF" opacity="0.6"/>
    <text x="20" y="60" font-family="Montserrat, sans-serif" font-size="10" text-anchor="middle" fill="#2C2C2C">Basic</text>
  </g>
  
  <!-- Brilliant Diamond -->
  <g transform="translate(130, 80)">
    <polygon points="20,10 30,20 20,40 10,20" fill="#D4AF37" stroke="#2C2C2C" stroke-width="1"/>
    <polygon points="20,10 25,15 20,20 15,15" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="16" cy="16" r="1" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="24" cy="24" r="0.8" fill="#FFFFFF" opacity="0.7"/>
    <text x="20" y="60" font-family="Montserrat, sans-serif" font-size="10" text-anchor="middle" fill="#2C2C2C">Brilliant</text>
  </g>
  
  <!-- Minimal Diamond -->
  <g transform="translate(210, 80)">
    <polygon points="20,15 25,20 20,30 15,20" fill="transparent" stroke="#D4AF37" stroke-width="2"/>
    <text x="20" y="60" font-family="Montserrat, sans-serif" font-size="10" text-anchor="middle" fill="#2C2C2C">Minimal</text>
  </g>
  
  <!-- Jewelry Icons -->
  <text x="320" y="60" font-family="Montserrat, sans-serif" font-size="14" font-weight="600" fill="#6B8A6B">JEWELRY ICONS</text>
  
  <!-- Ring Icon -->
  <g transform="translate(350, 80)">
    <ellipse cx="20" cy="25" rx="15" ry="4" fill="transparent" stroke="#D4AF37" stroke-width="2"/>
    <polygon points="20,15 23,18 20,22 17,18" fill="#D4AF37"/>
    <text x="20" y="60" font-family="Montserrat, sans-serif" font-size="10" text-anchor="middle" fill="#2C2C2C">Ring</text>
  </g>
  
  <!-- Necklace Icon -->
  <g transform="translate(430, 80)">
    <path d="M 10 20 Q 20 30 30 20" stroke="#D4AF37" stroke-width="2" fill="none"/>
    <polygon points="20,25 22,27 20,30 18,27" fill="#D4AF37"/>
    <text x="20" y="60" font-family="Montserrat, sans-serif" font-size="10" text-anchor="middle" fill="#2C2C2C">Necklace</text>
  </g>
  
  <!-- Earrings Icon -->
  <g transform="translate(510, 80)">
    <circle cx="15" cy="20" r="3" fill="transparent" stroke="#D4AF37" stroke-width="2"/>
    <circle cx="25" cy="20" r="3" fill="transparent" stroke="#D4AF37" stroke-width="2"/>
    <circle cx="15" cy="20" r="1" fill="#D4AF37"/>
    <circle cx="25" cy="20" r="1" fill="#D4AF37"/>
    <text x="20" y="45" font-family="Montserrat, sans-serif" font-size="10" text-anchor="middle" fill="#2C2C2C">Earrings</text>
  </g>
  
  <!-- Action Icons -->
  <text x="20" y="140" font-family="Montserrat, sans-serif" font-size="14" font-weight="600" fill="#6B8A6B">ACTION ICONS</text>
  
  <!-- Heart/Favorite -->
  <g transform="translate(50, 160)">
    <path d="M 20 30 C 15 20, 5 20, 10 25 C 5 20, 15 10, 20 15 C 25 10, 35 20, 30 25 C 35 20, 25 20, 20 30 Z" fill="transparent" stroke="#E8B4B8" stroke-width="2"/>
    <text x="20" y="50" font-family="Montserrat, sans-serif" font-size="10" text-anchor="middle" fill="#2C2C2C">Favorite</text>
  </g>
  
  <!-- Shopping Cart -->
  <g transform="translate(130, 160)">
    <rect x="12" y="22" width="16" height="8" rx="1" fill="transparent" stroke="#D4AF37" stroke-width="2"/>
    <circle cx="16" cy="34" r="2" fill="transparent" stroke="#D4AF37" stroke-width="2"/>
    <circle cx="24" cy="34" r="2" fill="transparent" stroke="#D4AF37" stroke-width="2"/>
    <path d="M 8 15 L 12 15 L 14 22" stroke="#D4AF37" stroke-width="2" fill="none"/>
    <text x="20" y="55" font-family="Montserrat, sans-serif" font-size="10" text-anchor="middle" fill="#2C2C2C">Cart</text>
  </g>
  
  <!-- Search -->
  <g transform="translate(210, 160)">
    <circle cx="18" cy="20" r="8" fill="transparent" stroke="#6B8A6B" stroke-width="2"/>
    <path d="M 24 26 L 30 32" stroke="#6B8A6B" stroke-width="2"/>
    <text x="20" y="55" font-family="Montserrat, sans-serif" font-size="10" text-anchor="middle" fill="#2C2C2C">Search</text>
  </g>
  
  <!-- User Account -->
  <g transform="translate(290, 160)">
    <circle cx="20" cy="18" r="6" fill="transparent" stroke="#2C2C2C" stroke-width="2"/>
    <path d="M 10 32 Q 15 26 20 26 Q 25 26 30 32" stroke="#2C2C2C" stroke-width="2" fill="none"/>
    <text x="20" y="55" font-family="Montserrat, sans-serif" font-size="10" text-anchor="middle" fill="#2C2C2C">Account</text>
  </g>
  
  <!-- Certification Icons -->
  <text x="20" y="240" font-family="Montserrat, sans-serif" font-size="14" font-weight="600" fill="#6B8A6B">CERTIFICATION ICONS</text>
  
  <!-- Lab-Grown Certified -->
  <g transform="translate(50, 260)">
    <circle cx="20" cy="20" r="12" fill="transparent" stroke="#87A96B" stroke-width="2"/>
    <polygon points="15,20 18,23 25,16" stroke="#87A96B" stroke-width="2" fill="none"/>
    <text x="20" y="50" font-family="Montserrat, sans-serif" font-size="10" text-anchor="middle" fill="#2C2C2C">Certified</text>
  </g>
  
  <!-- Eco-Friendly -->
  <g transform="translate(130, 260)">
    <path d="M 20 12 C 15 15, 15 20, 20 25 C 25 22, 30 18, 25 12 C 22 15, 18 15, 20 12 Z" fill="#87A96B"/>
    <text x="20" y="50" font-family="Montserrat, sans-serif" font-size="10" text-anchor="middle" fill="#2C2C2C">Eco-Friendly</text>
  </g>
  
  <!-- Conflict-Free -->
  <g transform="translate(210, 260)">
    <circle cx="20" cy="20" r="10" fill="transparent" stroke="#E8B4B8" stroke-width="2"/>
    <path d="M 15 15 L 25 25 M 25 15 L 15 25" stroke="#E8B4B8" stroke-width="2"/>
    <text x="20" y="50" font-family="Montserrat, sans-serif" font-size="10" text-anchor="middle" fill="#2C2C2C">Conflict-Free</text>
  </g>
  
  <!-- Utility Icons -->
  <text x="320" y="240" font-family="Montserrat, sans-serif" font-size="14" font-weight="600" fill="#6B8A6B">UTILITY ICONS</text>
  
  <!-- Menu -->
  <g transform="translate(350, 260)">
    <line x1="15" y1="16" x2="25" y2="16" stroke="#2C2C2C" stroke-width="2"/>
    <line x1="15" y1="20" x2="25" y2="20" stroke="#2C2C2C" stroke-width="2"/>
    <line x1="15" y1="24" x2="25" y2="24" stroke="#2C2C2C" stroke-width="2"/>
    <text x="20" y="45" font-family="Montserrat, sans-serif" font-size="10" text-anchor="middle" fill="#2C2C2C">Menu</text>
  </g>
  
  <!-- Close -->
  <g transform="translate(430, 260)">
    <path d="M 15 15 L 25 25 M 25 15 L 15 25" stroke="#2C2C2C" stroke-width="2"/>
    <text x="20" y="45" font-family="Montserrat, sans-serif" font-size="10" text-anchor="middle" fill="#2C2C2C">Close</text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(510, 260)">
    <path d="M 15 20 L 25 20 M 22 17 L 25 20 L 22 23" stroke="#D4AF37" stroke-width="2" fill="none"/>
    <text x="20" y="45" font-family="Montserrat, sans-serif" font-size="10" text-anchor="middle" fill="#2C2C2C">Arrow</text>
  </g>
  
  <!-- Usage Note -->
  <text x="20" y="370" font-family="Montserrat, sans-serif" font-size="12" fill="#6B8A6B">All icons available in multiple sizes and color variations. SVG format ensures scalability.</text>
</svg>