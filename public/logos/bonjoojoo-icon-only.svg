<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon-only version for favicons and small applications -->
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8B4B8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sparkle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Main Diamond -->
  <polygon points="30,10 45,25 30,50 15,25" fill="url(#iconGradient)" stroke="#2C2C2C" stroke-width="1"/>
  
  <!-- Top Facet -->
  <polygon points="30,10 37.5,17.5 30,25 22.5,17.5" fill="#FFFFFF" opacity="0.7"/>
  
  <!-- Side Facets -->
  <polygon points="22.5,17.5 15,25 30,25" fill="url(#iconGradient)" opacity="0.8"/>
  <polygon points="37.5,17.5 45,25 30,25" fill="url(#iconGradient)" opacity="0.6"/>
  
  <!-- Sparkle Effect -->
  <circle cx="25" cy="20" r="2" fill="url(#sparkle)"/>
  <circle cx="35" cy="30" r="1.5" fill="url(#sparkle)"/>
</svg>